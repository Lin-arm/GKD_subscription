name: check_fix_push

on:
  push:
    branches:
      - '**'

permissions: write-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    if: |
      ${{ github.event.head_commit.message!='chore(actions): check_format_lint' }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 获取本次 push 的资源链接变更文件
        id: resource_changed_files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work

          BEFORE_SHA="${{ github.event.before }}"
          CURRENT_SHA="${{ github.sha }}"

          if [ -z "$BEFORE_SHA" ] || [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            echo "::error::无法可靠识别“本次 push 变更”的资源文件：github.event.before 为空或全 0。当前工作流只允许校验本次 push 的差异文件，已拒绝回退为分支累计改动或全仓扫描。"
            echo "这通常发生在首次把本地分支推到远程时。请再次 push 一个增量提交后重试，或改在 PR 检查中执行资源链接校验。">&2
            exit 1
          fi

          if ! git rev-parse --verify "$BEFORE_SHA^{commit}" >/dev/null 2>&1; then
            echo "::error::无法解析 github.event.before=$BEFORE_SHA,对应提交不存在,无法只按本次 push 差异做资源链接校验。">&2
            exit 1
          fi

          git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" -- 'src/apps/*.ts' 'src/globalGroups.ts' \
            | sort -u > work/resource-files.txt

          FILE_COUNT="$(grep -c '.' work/resource-files.txt || true)"

          {
            echo "has_files=$([ "$FILE_COUNT" -gt 0 ] && echo true || echo false)"
            echo "files<<EOF"
            cat work/resource-files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 配置 Node.js 运行环境
        uses: actions/setup-node@v5
        with:
          node-version: 25
          package-manager-cache: false

      - name: 启用 corepack 并安装 pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 安装项目依赖
        run: pnpm install

      - name: 校验本次 push 变更中的资源链接
        if: steps.resource_changed_files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work
          mapfile -t RESOURCE_FILES < work/resource-files.txt
          pnpm run check:resource-links -- --mode enforce --report-file work/resource-links-report.json --files "${RESOURCE_FILES[@]}"

      - name: 执行项目检查
        run: pnpm run check

      - name: 执行代码格式化
        run: pnpm run format

      - name: 执行代码静态检查
        run: pnpm run lint

      - name: 提交自动修复结果
        id: commit
        run: |
          git config --local user.email github-actions[bot]@users.noreply.github.com
          git config --local user.name github-actions[bot]
          git status --porcelain
          git --no-pager diff
          git commit -a -m "chore(actions): check_format_lint"
        continue-on-error: true

      - name: 推送修复后的代码
        uses: ad-m/github-push-action@master
        if: ${{ steps.commit.outcome == 'success' }}
        with:
          branch: ${{ github.ref }}
