name: issue_content_check

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

env:
  GH_REPO: ${{ github.repository }}

jobs:
  # ── 分析节点：Python 只运行一次，输出所有原子化标志 ──

  analyze:
    name: 分析 Issue 快照链接
    runs-on: ubuntu-latest
    outputs:
      has_snapshot: ${{ steps.analyze.outputs.has_snapshot }}
      has_local_link: ${{ steps.analyze.outputs.has_local_link }}
      has_unreachable: ${{ steps.analyze.outputs.has_unreachable }}
      network_status: ${{ steps.analyze.outputs.network_status }}
      network_detail: ${{ steps.analyze.outputs.network_detail }}
      has_convertible: ${{ steps.analyze.outputs.has_convertible }}
      warning_type: ${{ steps.analyze.outputs.warning_type }}
      comment_missing: ${{ steps.analyze.outputs.comment_missing }}
      comment_local: ${{ steps.analyze.outputs.comment_local }}
      comment_unreachable: ${{ steps.analyze.outputs.comment_unreachable }}
      comment_404: ${{ steps.analyze.outputs.comment_404 }}
      comment_uncertain: ${{ steps.analyze.outputs.comment_uncertain }}
      comment_recovery: ${{ steps.analyze.outputs.comment_recovery }}
      comment_bot: ${{ steps.analyze.outputs.comment_bot }}
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 配置 Python 运行环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 创建工作流所需标签
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "缺失快照(missing-snapshot)" --color "e74c3c" --description "Issue缺少快照链接" --force
          gh label create "本地链接(local-link)" --color "e67e22" --description "Issue包含本地链接" --force
          gh label create "需补充链接(need-supplement-link)" --color "f39c12" --description "Issue包含不可访问的快照链接" --force
          gh label create "链接无法访问(inaccessible-link)" --color "c0392b" --description "Issue中的链接无法访问" --force

      - name: 分析 Issue 快照链接
        id: analyze
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_ACTION: ${{ github.event.action }}
        run: python3 scripts/python/check_issue.py

  # ── 处理分支一：缺失快照 → 打标签 + 评论 + 关闭 ──

  handle-missing-snapshot:
    name: 处理缺失快照
    needs: analyze
    if: needs.analyze.outputs.has_snapshot == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: 打标签「缺失快照」
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --add-label "缺失快照(missing-snapshot)"

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning-missing -->'

      - name: 发布缺失快照警告评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_missing }}
          edit-mode: replace

      - name: 关闭 Issue（缺失快照）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue close "$ISSUE_NUMBER" --reason "not planned"

  # ── 处理分支二：本地链接 → 打标签 + 评论（不关闭）──

  handle-local-link:
    name: 处理本地链接
    needs: analyze
    if: >
      needs.analyze.outputs.has_local_link == 'true' &&
      needs.analyze.outputs.network_status != '404'
    runs-on: ubuntu-latest
    steps:
      - name: 打标签「本地链接」
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --add-label "本地链接(local-link)"

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning-local -->'

      - name: 发布本地链接警告评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_local }}
          edit-mode: replace

  # ── 处理分支三：不可访问快照 → 打标签 + 评论（不关闭）──

  handle-unreachable-snapshot:
    name: 处理不可访问快照
    needs: analyze
    if: >
      needs.analyze.outputs.has_unreachable == 'true' &&
      needs.analyze.outputs.network_status != '404'
    runs-on: ubuntu-latest
    steps:
      - name: 打标签「需补充链接」
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --add-label "需补充链接(need-supplement-link)"

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning-unreachable -->'

      - name: 发布不可访问快照提醒评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_unreachable }}
          edit-mode: replace

  # ── 处理分支四：链接不可访问（404）→ 打标签 + 评论 + 关闭 ──

  handle-network-404:
    name: 处理链接不可访问(404)
    needs: analyze
    if: needs.analyze.outputs.network_status == '404'
    runs-on: ubuntu-latest
    steps:
      - name: 打标签「链接无法访问」
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --add-label "链接无法访问(inaccessible-link)"

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning-404 -->'

      - name: 发布链接不可访问警告评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_404 }}
          edit-mode: replace

      - name: 关闭 Issue（链接不可访问）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue close "$ISSUE_NUMBER" --reason "not planned"

  # ── 处理分支五：网络不确定（403/5xx）→ 打标签 + 折叠评论（不关闭）──

  handle-network-uncertain:
    name: 处理网络不确定(403/5xx)
    needs: analyze
    if: needs.analyze.outputs.network_status == 'uncertain'
    runs-on: ubuntu-latest
    steps:
      - name: 打标签「链接无法访问」（不确定）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --add-label "链接无法访问(inaccessible-link)"

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning-uncertain -->'

      - name: 发布网络不确定提醒评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_uncertain }}
          edit-mode: replace

  # ── 处理分支六：链接转换 + Bot 评论（检查通过）──

  handle-convert:
    name: 处理链接转换
    needs: analyze
    if: needs.analyze.outputs.has_convertible == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 查找已有 Bot 评论
        id: find-bot
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-bot-comment -->'

      - name: 发布/更新快照转换评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-bot.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_bot }}
          edit-mode: replace

  # ── 处理分支七：编辑恢复（移除旧标签 + 重新打开 Issue）──

  handle-recovery:
    name: 处理编辑后恢复issue状态
    needs: analyze
    if: needs.analyze.outputs.warning_type == 'recovery'
    runs-on: ubuntu-latest
    steps:
      - name: 移除所有本工作流管理的标签
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          for label in \
            "缺失快照(missing-snapshot)" \
            "本地链接(local-link)" \
            "需补充链接(need-supplement-link)" \
            "链接无法访问(inaccessible-link)"; do
            gh issue edit "$ISSUE_NUMBER" --remove-label "$label" 2>/dev/null || true
          done

      - name: 重新打开 Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue reopen "$ISSUE_NUMBER" || true

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning'

      - name: 发布恢复评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_recovery }}
          edit-mode: replace

      - name: 清理残留警告评论
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          comment_ids=$(gh api "repos/$GH_REPO/issues/$ISSUE_NUMBER/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | test("gkd-warning")) | select(.body | test("gkd-warning-recovery") | not) | .id')
          for id in $comment_ids; do
            gh api "repos/$GH_REPO/issues/comments/$id" -X DELETE 2>/dev/null || true
          done
