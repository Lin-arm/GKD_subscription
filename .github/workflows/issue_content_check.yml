name: issue_content_check

on:
  issues:
    types: [opened, edited]

concurrency:
  # 避免同一个 issue 在 opened / edited 连续触发时并发回写，造成标题或正文相互覆盖。
  group: issue-content-check-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # 1）先检查原始 issue 正文，决定后续是关闭、提醒，还是进入解析流程。
  prepare:
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    outputs:
      should_close: ${{ steps.collect.outputs.should_close }}
      should_warn_uploading: ${{ steps.collect.outputs.should_warn_uploading }}
      should_warn_private: ${{ steps.collect.outputs.should_warn_private }}
      should_parse: ${{ steps.collect.outputs.should_parse }}
      source_count: ${{ steps.collect.outputs.source_count }}
      urls_json: ${{ steps.collect.outputs.urls_json }}

    steps:
      - name: 分类 Issue 并提取可解析快照链接
        id: collect
        shell: bash
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          BODY="$(printf '%s' "${ISSUE_BODY:-}" | tr -d '\r')"

          HAS_UPLOADING=false
          HAS_PRIVATE=false

          # 出现 "Uploading" 说明 GitHub 附件还没传完，此时链接通常还不可用。
          if grep -q 'Uploading' <<< "$BODY"; then
            HAS_UPLOADING=true
          fi

          # /snapshot/ 分享链接只有上传者自己可见，维护者无法直接访问。
          if grep -Eq 'https?://(i\.gkd\.li|igkd\.li)/snapshot/' <<< "$BODY"; then
            HAS_PRIVATE=true
          fi

          # 这里只保留当前工作流真正能尝试下载的来源：
          # 1. 公开的 i.gkd.li 分享链接
          # 2. 直接可下载的 zip 附件链接
          grep -oE 'https?://[^[:space:]<>()]+' <<< "$BODY" \
            | sed -E 's/[)>.,]+$//' \
            | grep -E '(^https?://(i\.gkd\.li|igkd\.li)/i/[0-9]+([?][^[:space:]]*)?$|^https?://[^[:space:]]+\.zip([?][^[:space:]]*)?$)' \
            | sort -u > urls.txt || true

          SOURCE_COUNT="$(wc -l < urls.txt | tr -d ' ')"

          SHOULD_PARSE=false
          SHOULD_CLOSE=false

          if [ "$SOURCE_COUNT" -gt 0 ]; then
            SHOULD_PARSE=true
          elif [ "$HAS_UPLOADING" = false ] && [ "$HAS_PRIVATE" = false ]; then
            # 既没有可解析快照，也不是“上传中 / 私有链接”这类可补救情况，直接按无效 issue 处理。
            SHOULD_CLOSE=true
          fi

          URLS_JSON="$(jq -Rsc 'split("\n") | map(select(length > 0))' urls.txt)"

          {
            echo "should_close=$SHOULD_CLOSE"
            echo "should_warn_uploading=$HAS_UPLOADING"
            echo "should_warn_private=$HAS_PRIVATE"
            echo "should_parse=$SHOULD_PARSE"
            echo "source_count=$SOURCE_COUNT"
            echo "urls_json=$URLS_JSON"
          } >> "$GITHUB_OUTPUT"

  # 2）对当前还无法解析的 issue 给出可执行的反馈，例如补传或改用公开链接。
  notify-invalid:
    needs: prepare
    if: |
      needs.prepare.result == 'success' &&
      (
        needs.prepare.outputs.should_close == 'true' ||
        needs.prepare.outputs.should_warn_uploading == 'true' ||
        needs.prepare.outputs.should_warn_private == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      issues: write # 用于覆写评论追加信息

    steps:
      - name: 缺少快照时自动标记并关闭 Issue
        if: needs.prepare.outputs.should_close == 'true'
        uses: actions-cool/issues-helper@v3
        with:
          actions: add-labels,create-comment,close-issue
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'invalid'
          body: |
            您好 ${{ github.event.issue.user.login }}，由于您没有提供快照，此 issue 已被自动关闭。

      - name: 上传未完成时自动标记并提醒
        if: needs.prepare.outputs.should_warn_uploading == 'true'
        uses: actions-cool/issues-helper@v3
        with:
          actions: add-labels,create-comment
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'invalid'
          body: |
            您好 ${{ github.event.issue.user.login }}，检测到您提供的文件仍处于 Uploading 状态，
            请等待上传完成后重新提交，或补充可访问的 zip / 分享链接。

            可在下方评论区补充

      - name: 快照链接不可访问时自动标记并提醒
        if: needs.prepare.outputs.should_warn_private == 'true'
        uses: actions-cool/issues-helper@v3
        with:
          actions: add-labels,create-comment
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'invalid'
          body: |
            您好 ${{ github.event.issue.user.login }}，检测到您提供了他人无法访问的链接，
            请点击查看 [正确的分享快照方式说明](https://gkd.li/guide/snapshot#share-note) 。

            可在下方评论区补充

  # 3）下载快照、生成去重汇总，并把标题和正文同步回 issue。
  parse-and-sync:
    name: 解析快照并同步 Issue
    needs: prepare
    if: needs.prepare.result == 'success' && needs.prepare.outputs.should_parse == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: 下载快照并生成去重汇总
        id: parse
        shell: bash
        env:
          URLS_JSON: ${{ needs.prepare.outputs.urls_json }}
        run: |
          set -euo pipefail

          # 统一的下载解压函数，同时服务于直接 zip 链接和分享链接解析后的真实附件地址。
          download_and_extract() {
            local url="$1"
            local zip_path="$2"
            local extract_dir="$3"

            rm -f "$zip_path"
            rm -rf "$extract_dir"
            mkdir -p "$extract_dir"

            curl -fsSL --retry 3 --connect-timeout 20 -o "$zip_path" "$url" &&
              unzip -qo "$zip_path" -d "$extract_dir" >/dev/null 2>&1
          }

          mkdir -p work
          printf '%s' "$URLS_JSON" > work/urls.json
          : > work/records.ndjson
          SOURCE_TOTAL="$(jq 'length' work/urls.json)"

          PARSED_COUNT=0
          SNAP_INDEX=0

          while IFS= read -r SOURCE_URL; do
            [ -n "$SOURCE_URL" ] || continue

            WORK_DIR="work/snap_${SNAP_INDEX}"
            ZIP_PATH="$WORK_DIR/snapshot.zip"
            EXTRACT_DIR="$WORK_DIR/extracted"
            SNAP_INDEX=$((SNAP_INDEX + 1))
            mkdir -p "$WORK_DIR"

            DOWNLOADED=false

            if [[ "$SOURCE_URL" =~ ^https?://(i\.gkd\.li|igkd\.li)/i/([0-9]+)(\?.*)?$ ]]; then
              SNAP_ID="${BASH_REMATCH[2]}"
              DOWNLOAD_URL="https://github.com/user-attachments/files/$SNAP_ID/file.zip"

              # 对公开 i.gkd.li 分享链接，优先尝试可预测的 GitHub 附件地址。
              if download_and_extract "$DOWNLOAD_URL" "$ZIP_PATH" "$EXTRACT_DIR"; then
                DOWNLOADED=true
              else
                # 兜底方案：打开分享页 HTML，从中提取第一个 zip 地址再尝试下载。
                PAGE_HTML="$(curl -fsSL --retry 2 --connect-timeout 20 "$SOURCE_URL" || true)"
                FALLBACK_URL="$(
                  printf '%s' "$PAGE_HTML" \
                    | grep -oE "https?://[^\"'[:space:]]+\\.zip[^\"'[:space:]]*" \
                    | head -n 1 || true
                )"

                if [ -n "$FALLBACK_URL" ] && download_and_extract "$FALLBACK_URL" "$ZIP_PATH" "$EXTRACT_DIR"; then
                  DOWNLOADED=true
                fi
              fi
            else
              if download_and_extract "$SOURCE_URL" "$ZIP_PATH" "$EXTRACT_DIR"; then
                DOWNLOADED=true
              fi
            fi

            if [ "$DOWNLOADED" = false ]; then
              continue
            fi

            JSON_PATH=""
            while IFS= read -r CANDIDATE; do
              if jq -e 'type == "object" and ((has("appId") and has("activityId")) or has("appInfo") or has("gkdAppInfo") or has("device"))' "$CANDIDATE" >/dev/null 2>&1; then
                JSON_PATH="$CANDIDATE"
                break
              fi
            done < <(find "$EXTRACT_DIR" -type f -name '*.json' | sort)

            if [ -z "$JSON_PATH" ]; then
              continue
            fi

            # 先把原始快照 JSON 规整成“每个来源一条扁平记录”，后面 jq 去重和出表都基于这层数据。
            if ! jq -c --arg sourceUrl "$SOURCE_URL" '
              def clean:
                if . == null then "未知"
                else tostring
                  | gsub("\\|"; "¦")
                  | gsub("[\\r\\n]+"; " ")
                  | gsub("\\s+"; " ")
                  | sub("^\\s+"; "")
                  | sub("\\s+$"; "")
                  | if . == "" then "未知" else . end
                end;
              def display_version(name; code):
                if (name != null and (name | tostring | length) > 0) and code != null then
                  ((name | tostring) + " (" + (code | tostring) + ")")
                elif name != null and (name | tostring | length) > 0 then
                  (name | tostring)
                elif code != null then
                  ("versionCode " + (code | tostring))
                else
                  "未知"
                end;
              {
                sourceUrl: $sourceUrl,
                appName: (.appInfo.name // .appInfo.id // .appId // "未知") | clean,
                appId: (.appInfo.id // .appId // "未知") | clean,
                appVersion: display_version(.appInfo.versionName; .appInfo.versionCode) | clean,
                activityId: (.activityId // "未知") | clean,
                resolution: (
                  if .screenWidth != null and .screenHeight != null
                  then ((.screenWidth | tostring) + "x" + (.screenHeight | tostring))
                  else "未知"
                  end
                ) | clean,
                orientation: (
                  if .isLandscape == true then "横屏"
                  elif .isLandscape == false then "竖屏"
                  else "未知"
                  end
                ),
                deviceInfo: (
                  [
                    .device.brand,
                    .device.manufacturer,
                    .device.model,
                    .device.device
                  ]
                  | map(select(. != null) | tostring)
                  | map(select(length > 0))
                  | reduce .[] as $item ([]; if index($item) == null then . + [$item] else . end)
                  | if length > 0 then join(" / ") else "未知" end
                ) | clean,
                androidInfo: (
                  if .device.release != null or .device.sdkInt != null
                  then "Android " + ((.device.release // "?") | tostring) + " / SDK " + ((.device.sdkInt // "?") | tostring)
                  else "未知"
                  end
                ) | clean,
                gkdInfo: (
                  ((.gkdAppInfo.name // "GKD") | tostring)
                  + " "
                  + (display_version(.gkdAppInfo.versionName; .gkdAppInfo.versionCode) | tostring)
                  + "<br>`"
                  + ((.gkdAppInfo.id // "未知") | tostring)
                  + "`"
                ) | clean
              }
            ' "$JSON_PATH" >> work/records.ndjson; then
              continue
            fi

            PARSED_COUNT=$((PARSED_COUNT + 1))
          done < <(jq -r '.[]' work/urls.json)

          if [ "$PARSED_COUNT" -eq 0 ]; then
            {
              echo "success=false"
              echo "failed_count=$SOURCE_TOTAL"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          jq -s '.' work/records.ndjson > work/records.json

          # 应用表按 名称 / 包名 / 版本 去重；同一应用下多个 ActivityId 合并到同一行展示。
          jq -r '
            def uniq_keep_order:
              reduce .[] as $item ([]; if index($item) == null then . + [$item] else . end);
            sort_by(.appName, .appId, .appVersion, .activityId)
            | group_by(.appName, .appId, .appVersion)
            | map({
                appName: .[0].appName,
                appId: .[0].appId,
                appVersion: .[0].appVersion,
                activityIds: ([.[].activityId] | uniq_keep_order)
              })
            | to_entries
            | map(
                "| \(.key + 1) | \(.value.appName) | `\(.value.appId)` | `\(.value.appVersion)` | "
                + (
                    .value.activityIds
                    | map("`\(.)`")
                    | join("<br>")
                  )
                + " |"
              )
            | join("\n")
          ' work/records.json > work/app_rows.md

          # 运行环境表按 分辨率 / 方向 / 设备 / Android / GKD 去重，避免同设备多快照重复占行。
          jq -r '
            sort_by(.resolution, .orientation, .deviceInfo, .androidInfo, .gkdInfo)
            | unique_by(.resolution, .orientation, .deviceInfo, .androidInfo, .gkdInfo)
            | to_entries
            | map("| \(.key + 1) | `\(.value.resolution)` | \(.value.orientation) | \(.value.deviceInfo) | `\(.value.androidInfo)` | \(.value.gkdInfo) |")
            | join("\n")
          ' work/records.json > work/env_rows.md

          # 自动标题前缀优先使用应用名；如果应用名拿不到，再退回到包名。
          PREFIX="$(jq -r '
            def uniq_keep_order:
              reduce .[] as $item ([]; if index($item) == null then . + [$item] else . end);
            ([ .[].appName | select(. != "未知") ] | uniq_keep_order) as $appNames
            | (
                if ($appNames | length) > 0
                then $appNames
                else [ .[].appId | select(. != "未知") ] | uniq_keep_order
                end
              )
            | join("/")
          ' work/records.json)"

          APP_ROW_COUNT="$(
            jq 'sort_by(.appName, .appId, .appVersion, .activityId) | group_by(.appName, .appId, .appVersion) | length' work/records.json
          )"
          ENV_ROW_COUNT="$(
            jq 'sort_by(.resolution, .orientation, .deviceInfo, .androidInfo, .gkdInfo) | unique_by(.resolution, .orientation, .deviceInfo, .androidInfo, .gkdInfo) | length' work/records.json
          )"

          {
            echo "success=true"
            echo "parsed_count=$PARSED_COUNT"
            echo "failed_count=$((SOURCE_TOTAL - PARSED_COUNT))"
            echo "prefix=$PREFIX"
            echo "app_row_count=$APP_ROW_COUNT"
            echo "env_row_count=$ENV_ROW_COUNT"
          } >> "$GITHUB_OUTPUT"

      - name: 快照无法解析时自动标记并提醒
        if: steps.parse.outputs.success != 'true'
        uses: actions-cool/issues-helper@v3
        with:
          actions: add-labels,create-comment
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'invalid'
          body: |
            您好 ${{ github.event.issue.user.login }}，检测到您提供的快照链接或附件暂时无法解析出有效快照 JSON。

            这通常意味着链接已失效、附件当前不可访问，或压缩包中不包含正确的快照内容。

            请重新分享公开可访问的快照链接（如 `https://i.gkd.li/i/12345678`），或补充可访问的 zip 文件后重新编辑此 issue。

      - name: 更新 Issue 标题与解析区块
        if: steps.parse.outputs.success == 'true'
        uses: actions/github-script@v7
        env:
          RES_PREFIX: ${{ steps.parse.outputs.prefix }}
          PARSED_COUNT: ${{ steps.parse.outputs.parsed_count }}
          SOURCE_COUNT: ${{ needs.prepare.outputs.source_count }}
          APP_ROW_COUNT: ${{ steps.parse.outputs.app_row_count }}
          ENV_ROW_COUNT: ${{ steps.parse.outputs.env_row_count }}
        with:
          script: |
            const fs = require('fs');

            const prefix = (process.env.RES_PREFIX || '').trim();
            const parsedCount = Number(process.env.PARSED_COUNT || 0);
            const sourceCount = Number(process.env.SOURCE_COUNT || 0);
            const appRowCount = Number(process.env.APP_ROW_COUNT || 0);
            const envRowCount = Number(process.env.ENV_ROW_COUNT || 0);
            const appRows = fs.readFileSync('work/app_rows.md', 'utf8').trim();
            const envRows = fs.readFileSync('work/env_rows.md', 'utf8').trim();

            const oldTitle = context.payload.issue.title || '';
            let newTitle = oldTitle;

            // 把 issue form 里的多行内容压成稳定的单行文本，便于后续生成标题和汇总文案。
            const cleanInline = (value) =>
              (value || '')
                .replace(/\r\n/g, '\n')
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean)
                .join(' ')
                .replace(/\s+/g, ' ')
                .trim();

            // 按标题提取某个 markdown 区块，同时返回移除该区块后的剩余正文。
            const extractSection = (body, headingPatterns) => {
              const normalized = body.replace(/\r\n/g, '\n');
              const lines = normalized.split('\n');
              const startIndex = lines.findIndex((line) =>
                headingPatterns.some((pattern) => pattern.test(line))
              );

              if (startIndex === -1) {
                return {
                  section: '',
                  remaining: normalized.trim()
                };
              }

              let endIndex = lines.length;
              for (let index = startIndex + 1; index < lines.length; index += 1) {
                if (/^#{1,6}\s/.test(lines[index])) {
                  endIndex = index;
                  break;
                }
              }

              const before = lines.slice(0, startIndex).join('\n').trimEnd();
              const section = lines.slice(startIndex, endIndex).join('\n').trim();
              const after = lines.slice(endIndex).join('\n').trimStart();
              const remaining = [before, after].filter(Boolean).join('\n\n').trim();

              return { section, remaining };
            };

            const startMarker = '<!-- gkd-auto-parse:start -->';
            const endMarker = '<!-- gkd-auto-parse:end -->';
            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const blockRe = new RegExp(`${escapeRegExp(startMarker)}[\\s\\S]*?${escapeRegExp(endMarker)}`, 'm');
            const oldBody = context.payload.issue.body || '';
            // 解析时只看用户原始正文，不把之前自动插入的解析区块再算进去，避免重复污染。
            const bodyWithoutBlock = oldBody.replace(blockRe, '').trim();

            const stripLeadingTitleSeparator = (value) =>
              (value || '').replace(/^[-:：|/\\\s]+/, '').trim();

            const extractUserTitleSuffix = (titleValue, generatedCore) => {
              const normalized = cleanInline(titleValue);
              if (!normalized) {
                return '';
              }
              if (!generatedCore) {
                return normalized;
              }
              if (normalized === generatedCore) {
                return '';
              }
              if (normalized.startsWith(generatedCore)) {
                return stripLeadingTitleSeparator(
                  normalized.slice(generatedCore.length),
                );
              }
              return normalized;
            };

            const tagMatch = oldTitle.match(/^(\[[^\]]+\])\s*(.*)$/);
            if (prefix) {
              // 保留原有 [Feature]/[Bug] 标签，刷新自动前缀，同时尽量保留用户自己写的标题后缀。
              const titleCore = prefix.trim();
              const rawTitleSuffix = tagMatch ? tagMatch[2] : oldTitle;
              const legacyCorePattern = new RegExp(
                `^${escapeRegExp(titleCore)}(?:\\s+[^\\s]+_)?(?:\\s*[-:：|/\\\\]\\s*)?`,
              );
              const normalizedRawTitleSuffix = cleanInline(rawTitleSuffix).replace(
                legacyCorePattern,
                '',
              );
              const userTitleSuffix = extractUserTitleSuffix(
                normalizedRawTitleSuffix,
                titleCore,
              );
              const mergedTitle = userTitleSuffix
                ? `${titleCore} - ${userTitleSuffix}`
                : titleCore;

              newTitle = tagMatch
                ? `${tagMatch[1]} ${mergedTitle}`.trim()
                : mergedTitle;
            }

            const newBlock = [
              startMarker,
              '## 📦 快照自动解析详情',
              '',
              '### 应用快照汇总',
              '',
              '| # | 📱 应用名称 | 📦 软件包名 | 🏷️ 应用版本 | 🧩 ActivityId |',
              '| :-- | :--- | :--- | :--- | :--- |',
              appRows,
              '',
              '### 运行环境汇总',
              '',
              '| # | 📐 分辨率 | 🧭 方向 | 📱 设备信息 | 🤖 Android | ⚙️ GKD |',
              '| :-- | :--- | :--- | :--- | :--- | :--- |',
              envRows,
              '',
              `✅ 成功解析 ${parsedCount}/${sourceCount} 个快照，应用信息去重后 ${appRowCount} 项，环境信息去重后 ${envRowCount} 项。`,
              endMarker
            ].join('\n');

            // 原始快照区始终放在最后，方便维护者继续直接核对用户提供的原始链接或附件。
            const snapshotSectionInfo = extractSection(bodyWithoutBlock, [
              /^###\s*📸\s*需要适配界面的快照\s*$/u,
              /^###\s*📸\s*请提供.*快照.*$/u
            ]);
            const newBody = [
              snapshotSectionInfo.remaining,
              newBlock,
              snapshotSectionInfo.section
            ]
              .filter(Boolean)
              .join('\n\n')
              .trimEnd();

            const labels = (context.payload.issue.labels || []).map((label) =>
              typeof label === 'string' ? label : label.name
            );
            const shouldReopen = context.payload.issue.state === 'closed' && labels.includes('invalid');

            // 只有标题 / 正文 / 状态确实发生变化时才回写；之前因 invalid 被自动关闭的会一并 reopen。
            if (newTitle !== oldTitle || newBody !== oldBody || shouldReopen) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                title: newTitle,
                body: newBody,
                ...(shouldReopen ? { state: 'open' } : {})
              });
            }

            // 已成功解析的 issue 不应继续保留 invalid 标签。
            if (labels.includes('invalid')) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'invalid'
                });
              } catch (error) {
                console.log(`remove invalid label skipped: ${error.message}`);
              }
            }
