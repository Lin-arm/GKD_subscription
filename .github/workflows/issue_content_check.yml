name: issue_content_check

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  check-issue-content:
    runs-on: ubuntu-latest
    steps:
      # ── 环境准备 ──

      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 配置 Python 运行环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 核心分析（Python 负责）──

      - name: 分析 Issue 快照链接
        id: analyze
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_ACTION: ${{ github.action }}
        run: python3 scripts/python/check_issue.py

      # ── GitHub 操作（Actions / gh CLI 负责）──

      - name: 添加标签
        if: steps.analyze.outputs.labels_to_add != ''
        env:
          LABELS: ${{ steps.analyze.outputs.labels_to_add }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS=',' read -ra LABELS <<< "$LABELS"
          for label in "${LABELS[@]}"; do
            gh issue edit "$ISSUE_NUMBER" --add-label "$label"
          done

      - name: 移除旧标签
        if: steps.analyze.outputs.labels_to_remove != ''
        env:
          LABELS: ${{ steps.analyze.outputs.labels_to_remove }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS=',' read -ra LABELS <<< "$LABELS"
          for label in "${LABELS[@]}"; do
            gh issue edit "$ISSUE_NUMBER" --remove-label "$label" || true
          done

      - name: 发布/更新警告评论
        if: steps.analyze.outputs.warning_comment != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning -->'
          body: ${{ steps.analyze.outputs.warning_comment }}

      - name: 发布/更新快照转换评论
        if: steps.analyze.outputs.bot_comment != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-bot-comment -->'
          body: ${{ steps.analyze.outputs.bot_comment }}

      - name: 关闭 Issue
        if: steps.analyze.outputs.should_close == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue close "$ISSUE_NUMBER" --reason "not planned"

      - name: 重新打开 Issue
        if: steps.analyze.outputs.should_reopen == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue reopen "$ISSUE_NUMBER" || true
