name: issue_content_check

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  repository-projects: read

env:
  GH_REPO: ${{ github.repository }}

jobs:
  # ── 分析节点：Python 只运行一次，输出所有原子化标志 ──

  analyze:
    name: 分析 Issue 快照链接
    runs-on: ubuntu-latest
    # issue_comment 事件仅处理 Issue 作者本人的评论
    if: >
      github.event_name != 'issue_comment' ||
      github.event.comment.user.login == github.event.issue.user.login
    outputs:
      has_snapshot: ${{ steps.analyze.outputs.has_snapshot }}
      has_unreachable: ${{ steps.analyze.outputs.has_unreachable }}
      network_status: ${{ steps.analyze.outputs.network_status }}
      network_detail: ${{ steps.analyze.outputs.network_detail }}
      has_convertible: ${{ steps.analyze.outputs.has_convertible }}
      warning_type: ${{ steps.analyze.outputs.warning_type }}
      comment_missing: ${{ steps.analyze.outputs.comment_missing }}
      comment_unreachable: ${{ steps.analyze.outputs.comment_unreachable }}
      comment_404: ${{ steps.analyze.outputs.comment_404 }}
      comment_uncertain: ${{ steps.analyze.outputs.comment_uncertain }}
      comment_recovery: ${{ steps.analyze.outputs.comment_recovery }}
      comment_bot: ${{ steps.analyze.outputs.comment_bot }}
    steps:
      - name: 预检查是否需要分析（仅 issue_comment 事件）
        id: pre-check
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          state=$(gh issue view "$ISSUE_NUMBER" --json state -q .state)
          labels=$(gh issue view "$ISSUE_NUMBER" --json labels -q '.labels[].name')
          needs="false"
          [ "$state" = "CLOSED" ] && needs="true"
          for label in $labels; do
            case "$label" in
              "缺失快照(missing-snapshot)"|"需补充链接(need-supplement-link)"|"链接无法访问(inaccessible-link)")
                needs="true" ;;
            esac
          done
          echo "needs_analysis=$needs" >> "$GITHUB_OUTPUT"

      - name: 检出代码仓库
        if: >-
          github.event_name != 'issue_comment' ||
          steps.pre-check.outputs.needs_analysis != 'false'
        uses: actions/checkout@v7

      - name: 配置 Python 运行环境
        if: >-
          github.event_name != 'issue_comment' ||
          steps.pre-check.outputs.needs_analysis != 'false'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 创建工作流所需标签
        if: >-
          github.event_name != 'issue_comment' ||
          steps.pre-check.outputs.needs_analysis != 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "缺失快照(missing-snapshot)" --color "e74c3c" --description "Issue缺少快照链接" --force
          gh label create "需补充链接(need-supplement-link)" --color "f39c12" --description "Issue包含不可访问的快照链接" --force
          gh label create "链接无法访问(inaccessible-link)" --color "c0392b" --description "Issue中的链接无法访问" --force

      # issue_comment 事件时，获取旧 Bot 评论或所有评论作为历史链接来源
      - name: 获取历史链接
        id: get-history
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # 1. 尝试读取旧 Bot 评论（已解析成功的快照链接）
          old_bot=$(gh api "repos/$GH_REPO/issues/$ISSUE_NUMBER/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("gkd-bot-comment")) | .body' 2>/dev/null | head -1)

          if [ -n "$old_bot" ]; then
            echo "history_source=old_bot" >> "$GITHUB_OUTPUT"
            echo "history_content<<EOF" >> "$GITHUB_OUTPUT"
            echo "$old_bot" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            # 2. Fallback: 获取所有评论
            all_comments=$(gh api "repos/$GH_REPO/issues/$ISSUE_NUMBER/comments" \
              --jq '.[].body' 2>/dev/null | sed ':a;N;$!ba;s/\n/\\n/g')
            echo "history_source=all_comments" >> "$GITHUB_OUTPUT"
            echo "history_content<<EOF" >> "$GITHUB_OUTPUT"
            echo "$all_comments" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      # 恢复快照缓存（所有事件都可读取）
      - name: 恢复快照缓存
        uses: actions/cache/restore@v4
        with:
          path: /tmp/snapshot_cache
          key: snapshots-${{ github.event.issue.number }}
          restore-keys: |
            snapshots-

      - name: 分析 Issue 快照链接
        id: analyze
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_COMMENT_BODY: ${{ github.event.comment.body || '' }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_ACTION: ${{ github.event_name == 'issue_comment' && 'comment' || github.event.action }}
          SKIP_ANALYSIS: ${{ github.event_name == 'issue_comment' && steps.pre-check.outputs.needs_analysis == 'false' }}
          HISTORY_CONTENT: ${{ steps.get-history.outputs.history_content || '' }}
          HISTORY_SOURCE: ${{ steps.get-history.outputs.history_source || '' }}
        run: |
          if [ "$SKIP_ANALYSIS" = "true" ]; then
            cat >> "$GITHUB_OUTPUT" <<EOF
          has_snapshot=true
          has_unreachable=false
          network_status=ok
          network_detail=
          has_convertible=false
          warning_type=
          comment_missing=
          comment_unreachable=
          comment_404=
          comment_uncertain=
          comment_recovery=
          comment_bot=
          EOF
          else
            python3 scripts/python/entry/check_issue.py
          fi

      # 保存快照缓存（仅 issues 事件有写权限）
      - name: 保存快照缓存
        if: github.event_name == 'issues'
        uses: actions/cache/save@v4
        with:
          path: /tmp/snapshot_cache
          key: snapshots-${{ github.event.issue.number }}

  # ── 线性步骤一：缺失快照 → 打标签 + 评论 + 关闭（致命，阻断后续所有 Job） ──

  handle-missing-snapshot:
    name: 处理缺失快照
    needs: analyze
    if: needs.analyze.outputs.has_snapshot == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: 打标签「缺失快照」
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --add-label "缺失快照(missing-snapshot)"

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning-missing -->'

      - name: 发布缺失快照警告评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_missing }}
          edit-mode: replace

      - name: 关闭 Issue（缺失快照）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue close "$ISSUE_NUMBER" --reason "not planned"

  # ── 线性步骤二：本地快照链接 → 打标签 + 评论（非致命，不阻断后续） ──

  handle-unreachable-snapshot:
    name: 处理本地快照链接
    needs: [analyze, handle-missing-snapshot]
    if: >-
      always() &&
      needs.handle-missing-snapshot.result == 'skipped' &&
      needs.analyze.outputs.has_unreachable == 'true' &&
      needs.analyze.outputs.warning_type != 'recovery'
    runs-on: ubuntu-latest
    steps:
      - name: 打标签「需补充链接」
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --add-label "需补充链接(need-supplement-link)"

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning-unreachable -->'

      - name: 发布本地快照提醒评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_unreachable }}
          edit-mode: replace

  # ── 分支步骤三：链接不可访问（404）→ 打标签 + 评论（非致命，阻断转换） ──

  handle-network-404:
    name: 处理链接不可访问(404)
    needs: [analyze, handle-missing-snapshot]
    if: >-
      always() &&
      needs.handle-missing-snapshot.result == 'skipped' &&
      needs.analyze.outputs.network_status == '404'
    runs-on: ubuntu-latest
    steps:
      - name: 打标签「链接无法访问」
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --add-label "链接无法访问(inaccessible-link)"

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning-404 -->'

      - name: 发布链接不可访问提醒评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_404 }}
          edit-mode: replace

  # ── 分支步骤三：网络不确定（403/5xx）→ 打标签 + 折叠评论（非致命，阻断转换） ──

  handle-network-uncertain:
    name: 处理网络不确定(403/5xx)
    needs: [analyze, handle-missing-snapshot]
    if: >-
      always() &&
      needs.handle-missing-snapshot.result == 'skipped' &&
      needs.analyze.outputs.network_status == 'uncertain'
    runs-on: ubuntu-latest
    steps:
      - name: 打标签「链接无法访问」（不确定）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --add-label "链接无法访问(inaccessible-link)"

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning-uncertain -->'

      - name: 发布网络不确定提醒评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_uncertain }}
          edit-mode: replace

  # ── 步骤四：链接转换 + Bot 评论（仅当缺失未触发 + 网络可访问时） ──

  handle-convert:
    name: 处理链接转换
    needs:
      [
        analyze,
        handle-missing-snapshot,
        handle-network-404,
        handle-network-uncertain,
      ]
    if: >-
      always() &&
      needs.handle-missing-snapshot.result == 'skipped' &&
      needs.handle-network-404.result == 'skipped' &&
      needs.handle-network-uncertain.result == 'skipped' &&
      needs.analyze.outputs.has_convertible == 'true'
    runs-on: ubuntu-latest
    steps:
      # issue_comment 事件时，隐藏旧 Bot 评论（折叠为 OUTDATED）
      - name: 获取旧 Bot 评论的 Node ID
        if: github.event_name == 'issue_comment'
        id: get-old-bot-node
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          node_id=$(gh api graphql -f query='
          query($owner: String!, $name: String!, $number: Int!) {
            repository(owner: $owner, name: $name) {
              issue(number: $number) {
                comments(first: 100) {
                  nodes {
                    id
                    body
                    author { login }
                  }
                }
              }
            }
          }' -f owner="$REPO_OWNER" -f name="$REPO_NAME" -f number="$ISSUE_NUM" --jq '.data.repository.issue.comments.nodes[] | select(.author.login == "github-actions[bot]") | select(.body | contains("gkd-bot-comment")) | .id' 2>/dev/null | head -1)
          echo "node_id=$node_id" >> "$GITHUB_OUTPUT"

      - name: 隐藏旧 Bot 评论
        if: github.event_name == 'issue_comment' && steps.get-old-bot-node.outputs.node_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ID: ${{ steps.get-old-bot-node.outputs.node_id }}
        run: |
          gh api graphql -f query='
          mutation MinimizeComment($subjectId: ID!, $classifier: ReportedContentClassifiers!) {
            minimizeComment(input: { subjectId: $subjectId, classifier: $classifier }) {
              minimizedComment {
                isMinimized
                minimizedReason
              }
            }
          }' -f subjectId="$NODE_ID" -f classifier="OUTDATED"

      - name: 查找已有 Bot 评论
        id: find-bot
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-bot-comment -->'

      - name: 发布/更新快照转换评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-bot.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_bot }}
          edit-mode: replace

  # ── 步骤五：编辑/评论恢复（仅当缺失未触发 + 所有检查通过时） ──

  handle-recovery:
    name: 处理编辑/评论后恢复issue状态
    needs:
      [
        analyze,
        handle-missing-snapshot,
        handle-unreachable-snapshot,
        handle-network-404,
        handle-network-uncertain,
        handle-convert,
      ]
    if: >-
      always() &&
      needs.handle-missing-snapshot.result == 'skipped' &&
      needs.analyze.outputs.warning_type == 'recovery'
    runs-on: ubuntu-latest
    steps:
      - name: 移除所有本工作流管理的标签
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          for label in \
            "缺失快照(missing-snapshot)" \
            "需补充链接(need-supplement-link)" \
            "链接无法访问(inaccessible-link)"; do
            gh issue edit "$ISSUE_NUMBER" --remove-label "$label" 2>/dev/null || true
          done

      - name: 重新打开 Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue reopen "$ISSUE_NUMBER" || true

      - name: 查找已有警告评论
        id: find-warning
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gkd-warning'

      - name: 发布恢复评论
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-warning.outputs.comment-id }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ needs.analyze.outputs.comment_recovery }}
          edit-mode: replace

      - name: 清理残留警告评论
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          comment_ids=$(gh api "repos/$GH_REPO/issues/$ISSUE_NUMBER/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | test("gkd-warning")) | select(.body | test("gkd-warning-recovery") | not) | .id')
          for id in $comment_ids; do
            gh api "repos/$GH_REPO/issues/comments/$id" -X DELETE 2>/dev/null || true
          done
