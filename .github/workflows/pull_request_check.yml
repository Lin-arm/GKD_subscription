name: pull_request_check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5

      - name: 获取 PR 变更文件列表
        id: changed_files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            src/apps/*.ts
            src/categories.ts
            src/globalGroups.ts
            src/subscription.ts

      - name: 获取 PR 资源链接变更文件列表
        id: resource_changed_files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            src/apps/*.ts
            src/globalGroups.ts

      - name: 校验订阅文件变更数量
        run: |
          for file in ${{ steps.changed_files.outputs.all_changed_files }}; do
            echo "$file was changed"
          done
          if [ ${{ steps.changed_files.outputs.all_changed_files_count }} -gt 1 ]; then
            echo "your src subscription changed files count must <= 1"
            exit 1
          fi

      - name: 配置 Node.js 运行环境
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: 启用 corepack 并安装 pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 安装项目依赖
        run: pnpm install

      - name: 检查本次 PR 变更中的资源链接
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work

          if [ "${{ steps.resource_changed_files.outputs.all_changed_files_count }}" -eq 0 ]; then
            printf '%s\n' \
              '{' \
              '  "checkedFiles": [],' \
              '  "checkedLinks": 0,' \
              '  "invalidLinks": [],' \
              '  "uncertainLinks": []' \
              '}' > work/resource-links-report.json
            exit 0
          fi

          RESOURCE_FILES=(${{ steps.resource_changed_files.outputs.all_changed_files }})
          pnpm run check:resource-links -- --mode report --report-file work/resource-links-report.json --files "${RESOURCE_FILES[@]}"

      - name: 同步 PR 资源链接提醒评论
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- gkd-resource-link-check -->';
            const report = JSON.parse(
              fs.readFileSync('work/resource-links-report.json', 'utf8'),
            );

            const renderItems = (items) =>
              items.map((item, index) =>
                [
                  `${index + 1}. \`${item.file}\``,
                  `字段：\`${item.field}\``,
                  `位置：${item.context}`,
                  `链接：${item.url}`,
                  `原因：${item.reason}`,
                ].join('\n'),
              );

            const sections = [
              marker,
              '## 资源链接校验提醒',
              '',
              `本次共检查 **${report.checkedFiles.length}** 个文件、**${report.checkedLinks}** 个链接。`,
            ];

            if (report.invalidLinks.length > 0) {
              sections.push('', '### 明确失效', '', ...renderItems(report.invalidLinks));
            }

            if (report.uncertainLinks.length > 0) {
              sections.push(
                '',
                '### 网络异常 / 待人工确认',
                '',
                ...renderItems(report.uncertainLinks),
              );
            }

            const body = sections.join('\n\n').trim();

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });

              const existingComment = comments.find(
                (comment) =>
                  comment.user?.type === 'Bot' && comment.body?.includes(marker),
              );

              if (
                report.invalidLinks.length === 0 &&
                report.uncertainLinks.length === 0
              ) {
                if (existingComment) {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: existingComment.id,
                  });
                }
                return;
              }

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            } catch (error) {
              console.log(`sync pr resource link comment skipped: ${error.message}`);
            }

      - name: 执行项目检查
        run: pnpm run check

      - name: 执行代码格式化
        run: pnpm run format

      - name: 执行代码静态检查
        run: pnpm run lint

      - name: 校验代码格式化结果
        run: |
          echo "==== GIT STATUS ===="
          git status

          echo "==== GIT DIFF ===="
          git --no-pager diff || true

          status=$(git status --porcelain --untracked-files=no)
          if [ -n "$status" ]; then
            echo "❌ 某些内容格式不正确"
            exit 1
          fi
