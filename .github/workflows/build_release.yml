name: 构建并发布订阅

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 触发条件：定时任务或手动执行
# 是否会改仓库：会，构建成功后会提交产物、打 tag、发 release
# 失败含义：本次发版构建链路未完成
jobs:
  check_changes:
    name: 判断是否需要发布
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
          else
            prev_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
            if [ "$prev_tag" == "none" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              if git diff --exit-code $prev_tag HEAD -- src; then
                echo "No changes detected in 'src' directory between $prev_tag and the latest commit."
                echo "changed=false" >> $GITHUB_OUTPUT
              else
                echo "changed=true" >> $GITHUB_OUTPUT
              fi
            fi
          fi

  build_release:
    name: 构建产物并创建发行版
    needs: check_changes
    if: ${{ needs.check_changes.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 配置 Node.js 运行环境
        uses: actions/setup-node@v5
        with:
          node-version: 25
          package-manager-cache: false

      - name: 启用 corepack 并安装 pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 安装项目依赖
        run: pnpm install

      - name: 构建项目
        run: pnpm run build

      - name: 生成版本号
        id: version
        run: |
          version=$(node -e "import('@gkd-kit/tools').then((m) => m.stdoutGkdVersion());")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: 提交构建产物
        id: commit
        run: |
          git config --local user.email github-actions[bot]@users.noreply.github.com
          git config --local user.name github-actions[bot]
          git status
          git add .
          git commit -a -m "chore: v${{steps.version.outputs.version}}"
        continue-on-error: true

      - name: 推送代码到远程仓库
        if: ${{ steps.commit.outcome == 'success' }}
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true

      - name: 生成离线订阅文件（用于发行版）
        run: |
          cp dist/gkd.json5 "dist/gkd-subscription-offline-id667-v${{ steps.version.outputs.version }}.json5"

      - name: 创建 GitHub 发行版
        id: create_release
        if: ${{ steps.commit.outcome == 'success' }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: ./dist/CHANGELOG.md
          generate_release_notes: true
          append_body: true
          files: |
            dist/gkd-subscription-offline-id667-v${{ steps.version.outputs.version }}.json5
